server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${medical.datasource.driver-class-name}
      url: jdbc:mysql://${medical.datasource.host}:${medical.datasource.port}/${medical.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${medical.datasource.username}
      password: ${medical.datasource.password}
  redis:
    host: ${medical.redis.host}
    port: ${medical.redis.port}
    password: ${medical.redis.password}
    database: ${medical.redis.database}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.leo.medical.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      medical:
        mapper: debug
        service: info
        controller: info

medical:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    user-secret-key: itheima
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${medical.alioss.endpoint}
    access-key-id: ${medical.alioss.access-key-id}
    access-key-secret: ${medical.alioss.access-key-secret}
    bucket-name: ${medical.alioss.bucket-name}
  wechat:
    appid: ${medical.wechat.appid}
    secret: ${medical.wechat.secret}
    mchid: ${medical.wechat.mchid}
    mchSerialNo: ${medical.wechat.mchSerialNo}
    privateKeyFilePath: ${medical.wechat.privateKeyFilePath}
    apiV3Key: ${medical.wechat.apiV3Key}
    weChatPayCertFilePath: ${medical.wechat.weChatPayCertFilePath}
    notifyUrl: ${medical.wechat.notifyUrl}
    refundNotifyUrl: ${medical.wechat.refundNotifyUrl}
  shop:
    address: 湖北省武汉市洪山区徐东大街18号
  baidu:
    ak: EFEEFFEFEFE
    # AI Agent 大模型配置 (用于智能导诊)
  ai:
    deepseek:
      api-key: ${medical.ai.deepseek.api-key}  # 开源占位符
      api-url: ${medical.ai.deepseek.api-url}